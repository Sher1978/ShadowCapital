name: Shadow Bot Wake-up (Scheduled Pokes)

on:
  schedule:
    # 06:00 UTC = 09:00 Moscow (Morning Pulse)
    - cron: '0 6 * * *'
    # 17:30 UTC = 20:30 Moscow (Deadline Control)
    - cron: '30 17 * * *'
    # 18:30 UTC = 21:30 Moscow (Evening Concentrate)
    - cron: '30 18 * * *'
    # Optional: Every 6 hours just to keep things fresh
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  wake_up:
    runs-on: ubuntu-latest
    steps:
      - name: Poke Bot Health Check
        run: |
          curl -s https://shadow-sprint-bot-1097154359322.us-central1.run.app/ > /dev/null
          echo "Bot poked successfully at $(date)"

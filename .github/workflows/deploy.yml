name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: shershadow
  SERVICE_NAME: shadow-sprint-bot
  REGION: us-central1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/shadow-bot/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/shadow-bot/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Create Persistence Bucket (if not exists)
        run: |
          gcloud storage buckets create gs://shadow-bot-persistence-shershadow --project ${{ env.PROJECT_ID }} --location ${{ env.REGION }} || true

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/shadow-bot/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 1 \
            --no-cpu-throttling \
            --timeout 300 \
            --add-volume=name=persistence-volume,type=cloud-storage,bucket=shadow-bot-persistence-shershadow \
            --add-volume-mount=volume=persistence-volume,mount-path=/app/data \
            --set-env-vars "BOT_TOKEN=${{ secrets.BOT_TOKEN }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},ADMIN_IDS=${{ secrets.ADMIN_IDS }},REDIS_URL=${{ secrets.REDIS_URL }},FIREBASE_DATABASE_ID=test-db-123456789,FIREBASE_PROJECT_ID=shershadow,GOOGLE_CREDENTIALS=${{ secrets.GCP_SA_KEY }}"
